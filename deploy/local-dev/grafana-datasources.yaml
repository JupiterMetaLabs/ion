apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    basicAuth: false
    isDefault: false
    version: 1
    editable: false
    jsonData:
      derivedFields:
        # Link logs to Tempo traces via "trace_id" field in JSON body
        - name: trace_id
          matcherType: regex
          # Matches "trace_id":"<hex>" or "trace_id": "<hex>" in JSON logs
          matcherRegex: '"trace_id"\s*:\s*"(\w+)"'
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"
          url: "${__value.raw}"

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogs:
        datasourceUid: loki
        tags:
          - job
          - service
          - service_name
        filterByTraceID: true
        filterBySpanID: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
